name: Update Visual Snapshots

on:
  issue_comment:
    types:
      - created

jobs:
  update-snapshots:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/update-snapshots'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    env:
      BASE_URL: https://www.saucedemo.com
      STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Get PR information
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('ref', pull.head.ref);
            core.setOutput('repo', pull.head.repo.full_name);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Update snapshots
        run: |
          npx playwright test tests/screenShot.spec.ts \
            --project=chromium \
            --update-snapshots

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tests/**/*-snapshots
          git add tests/__screenshots__ || true

          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore: update Playwright visual snapshots"
            git push
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ Playwright visual snapshots have been updated and committed."
            });