name: Visual Regression Tests

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  visual-tests:
    name: Visual Regression (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BASE_URL: https://www.saucedemo.com
      STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npx playwright test tests/screenShot.spec.ts --project=chromium

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 30

      - name: Upload visual snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: |
            tests/**/*-snapshots/**
            tests/__screenshots__/**
          if-no-files-found: ignore
          retention-days: 30

  publish-results:
    name: Publish Test Results
    needs: visual-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const artifacts = fs.existsSync('./artifacts')
              ? fs.readdirSync('./artifacts')
              : [];

            let body = '## 📸 Playwright Visual Regression Results\n\n';
            body += '**Browser:** Chromium\n\n';

            body += '### Artifacts\n';
            artifacts.forEach(a => {
              body += `- ${a}\n`;
            });

            body += '\nDownload the **test-results** artifact to inspect any generated expected, actual, and diff screenshots.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });