name: Visual Regression Tests

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  visual-tests:
    name: Visual Regression (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BASE_URL: https://www.saucedemo.com
      STANDARD_USERNAME: ${{ secrets.STANDARD_USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Run visual tests (${{ matrix.browser }})
        run: npm run test:screenshots -- --project=${{ matrix.browser }}
        continue-on-error: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 30

      - name: Upload visual snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: |
            tests/**/*-snapshots/**
            tests/__screenshots__/**
          if-no-files-found: ignore
          retention-days: 30

  publish-results:
    name: Publish Test Results
    needs: visual-tests
    if: always()
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const artifacts = fs.readdirSync('./artifacts');
            const browsers = [...new Set(artifacts.map(a => a.split('-').pop()))];
            
            let comment = '## 📸 Visual Regression Tests\n\n';
            comment += `✅ Tests completed for: ${browsers.join(', ')}\n\n`;
            comment += '**Artifacts:**\n';
            artifacts.forEach(artifact => {
              comment += `- ${artifact}\n`;
            });
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });